<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rushikesh | LeetCode Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:       #0f0f12;
  --surface:  #16161a;
  --card:     #1c1c22;
  --card2:    #222228;
  --border:   #2e2e38;
  --border2:  #3d3d4a;
  --text:     #f0f0f5;
  --muted:    #6b6b7e;
  --subtle:   #9999ae;
  --accent:   #7c6af7;
  --accent-l: #a89cff;
  --easy:     #22c55e;
  --medium:   #f59e0b;
  --hard:     #ef4444;
  --easy-bg:  #0a1f12;
  --med-bg:   #1c1400;
  --hard-bg:  #1f0a0a;
  --glow-e:   #22c55e18;
  --glow-m:   #f59e0b18;
  --glow-h:   #ef444418;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent-l));
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.nav-links {
  display: flex;
  gap: 4px;
}
.nav-link {
  background: none; border: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--muted);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-link:hover { background: var(--card); color: var(--text); }
.nav-link.active { background: var(--card); color: var(--accent-l); }

/* ── HERO ── */
.hero {
  padding: 40px 40px 36px;
  background: linear-gradient(180deg, #13131a 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}
.hero-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  flex-wrap: wrap;
}
.hero h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.hero p { color: var(--muted); font-size: 13px; }

.stats-grid {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  min-width: 90px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-card.total  { border-color: #3a3555; background: #1a1828; }
.stat-card.easy   { border-color: #1a4025; background: var(--easy-bg); }
.stat-card.medium { border-color: #3a2c00; background: var(--med-bg); }
.stat-card.hard   { border-color: #3a1010; background: var(--hard-bg); }

.stat-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.stat-card.total  .stat-label { color: var(--accent-l); }
.stat-card.easy   .stat-label { color: var(--easy); }
.stat-card.medium .stat-label { color: var(--medium); }
.stat-card.hard   .stat-label { color: var(--hard); }

.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
}
.stat-card.total  .stat-num { color: var(--accent-l); }
.stat-card.easy   .stat-num { color: var(--easy); }
.stat-card.medium .stat-num { color: var(--medium); }
.stat-card.hard   .stat-num { color: var(--hard); }

.stat-bar-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.stat-bar { height: 100%; border-radius: 2px; width: 0; transition: width 0.8s ease; }
.stat-card.total  .stat-bar { background: var(--accent-l); }
.stat-card.easy   .stat-bar { background: var(--easy); }
.stat-card.medium .stat-bar { background: var(--medium); }
.stat-card.hard   .stat-bar { background: var(--hard); }

/* ── TOOLBAR ── */
.toolbar {
  padding: 16px 40px;
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 56px;
  z-index: 40;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 15px; pointer-events: none;
}
.search {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 14px 9px 36px;
  color: var(--text); font-size: 14px;
  font-family: 'Inter', sans-serif;
  outline: none; transition: border-color 0.15s;
}
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }

.pills { display: flex; gap: 4px; }
.pill {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 14px;
  font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}
.pill:hover { color: var(--text); border-color: var(--border2); }
.pill.active        { background: #1e1a35; border-color: var(--accent); color: var(--accent-l); }
.pill.easy.active   { background: var(--easy-bg); border-color: var(--easy); color: var(--easy); }
.pill.medium.active { background: var(--med-bg); border-color: var(--medium); color: var(--medium); }
.pill.hard.active   { background: var(--hard-bg); border-color: var(--hard); color: var(--hard); }

.count-info { font-size: 12px; color: var(--muted); padding: 0 40px 10px; }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(272px, 1fr));
  gap: 10px;
  padding: 16px 40px 60px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; flex-direction: column; gap: 10px;
}
.card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(124,106,247,0.1); }
.card.easy:hover   { border-color: var(--easy);   box-shadow: 0 6px 24px var(--glow-e); }
.card.medium:hover { border-color: var(--medium); box-shadow: 0 6px 24px var(--glow-m); }
.card.hard:hover   { border-color: var(--hard);   box-shadow: 0 6px 24px var(--glow-h); }

.card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.card-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted); margin-bottom: 3px;
}
.card-title {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
}
.badge {
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px; flex-shrink: 0;
}
.badge.Easy   { background: var(--easy-bg);  color: var(--easy);   border: 1px solid #22c55e33; }
.badge.Medium { background: var(--med-bg);   color: var(--medium); border: 1px solid #f59e0b33; }
.badge.Hard   { background: var(--hard-bg);  color: var(--hard);   border: 1px solid #ef444433; }

.card-langs { display: flex; gap: 5px; flex-wrap: wrap; }
.lang-chip {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px; color: var(--subtle);
}

/* ── STATES ── */
.state-box {
  grid-column: 1/-1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; padding: 80px 20px;
  color: var(--muted); font-size: 14px; text-align: center;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 200; padding: 28px 20px;
  overflow-y: auto; backdrop-filter: blur(6px);
}
.overlay.open { display: flex; align-items: flex-start; justify-content: center; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px; width: 100%; max-width: 840px;
  overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  margin: auto;
}

.modal-top {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 12px;
}
.modal-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.modal-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.modal-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.modal-close {
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); width: 30px; height: 30px;
  border-radius: 6px; cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--border2); color: var(--text); }

.lc-link {
  font-size: 11px; font-weight: 500; color: var(--accent-l);
  background: #1e1a35; border: 1px solid var(--accent);
  border-radius: 5px; padding: 4px 10px; text-decoration: none;
  transition: all 0.15s;
}
.lc-link:hover { background: #2a2550; }

/* tabs */
.tabs {
  display: flex; padding: 0 24px;
  border-bottom: 1px solid var(--border); gap: 0;
}
.tab {
  background: none; border: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500; color: var(--muted);
  padding: 11px 16px; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s; margin-bottom: -1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent-l); border-bottom-color: var(--accent-l); }

.tab-pane { display: none; }
.tab-pane.active { display: block; }

/* question — render HTML properly */
.q-body {
  padding: 24px; font-size: 14px; line-height: 1.9;
  color: #c8c8d8; max-height: 520px; overflow-y: auto;
}
.q-body h2 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.q-body h3 { font-size: 14px; font-weight: 600; color: var(--subtle); margin: 14px 0 6px; }
.q-body p  { margin-bottom: 10px; }
.q-body ul, .q-body ol { margin: 8px 0 10px 20px; }
.q-body li { margin-bottom: 4px; }
.q-body pre {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 14px; margin: 10px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: #a8a8c0;
  overflow-x: auto; white-space: pre-wrap;
}
.q-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; background: var(--card2);
  border: 1px solid var(--border); border-radius: 3px;
  padding: 1px 5px; color: var(--accent-l);
}
.q-body pre code { background: none; border: none; padding: 0; color: #a8a8c0; }
.q-body strong { color: var(--text); font-weight: 600; }
.q-body a { color: var(--accent-l); text-decoration: none; }
.q-body a:hover { text-decoration: underline; }
.q-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.q-body sup { font-size: 10px; }

/* solution */
.sol-pane { padding: 18px 24px 24px; }
.lang-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.lang-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 5px; padding: 5px 12px; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.lang-btn:hover { border-color: var(--border2); color: var(--text); }
.lang-btn.active { background: #1e1a35; border-color: var(--accent); color: var(--accent-l); }

.code-wrap { background: #0c0c10; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.code-header {
  padding: 8px 14px; background: var(--card2);
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted);
  display: flex; justify-content: space-between; align-items: center;
}
.copy-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-size: 11px; cursor: pointer;
  font-family: 'Inter', sans-serif; padding: 3px 8px;
  border-radius: 4px; transition: all 0.15s;
}
.copy-btn:hover { background: var(--border); color: var(--text); }
.code-pre {
  padding: 16px; font-family: 'JetBrains Mono', monospace;
  font-size: 13px; line-height: 1.7; color: #c9d1d9;
  overflow-x: auto; max-height: 440px; overflow-y: auto;
  white-space: pre; margin: 0;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    &lt;rbhomale17/&gt; solutions
  </div>
  <div class="nav-links">
    <button class="nav-link active">Solutions</button>
    <a class="nav-link" href="https://leetcode.com/u/rbhomale17/" target="_blank" style="text-decoration:none">LeetCode ↗</a>
    <a class="nav-link" href="https://github.com/rbhomale17/leetcode-solutions" target="_blank" style="text-decoration:none">GitHub ↗</a>
  </div>
</header>

<div class="hero">
  <div class="hero-top">
    <div>
      <h1>LeetCode Solutions</h1>
      <p>Every accepted submission — question, approach, and code.</p>
    </div>
    <div class="stats-grid">
      <div class="stat-card total">
        <span class="stat-label">Total</span>
        <span class="stat-num" id="sTotal">—</span>
        <div class="stat-bar-wrap"><div class="stat-bar" id="bTotal"></div></div>
      </div>
      <div class="stat-card easy">
        <span class="stat-label">Easy</span>
        <span class="stat-num" id="sEasy">—</span>
        <div class="stat-bar-wrap"><div class="stat-bar" id="bEasy"></div></div>
      </div>
      <div class="stat-card medium">
        <span class="stat-label">Medium</span>
        <span class="stat-num" id="sMed">—</span>
        <div class="stat-bar-wrap"><div class="stat-bar" id="bMed"></div></div>
      </div>
      <div class="stat-card hard">
        <span class="stat-label">Hard</span>
        <span class="stat-num" id="sHard">—</span>
        <div class="stat-bar-wrap"><div class="stat-bar" id="bHard"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" id="search" placeholder="Search by name or number…" />
  </div>
  <div class="pills">
    <button class="pill active" data-diff="all">All</button>
    <button class="pill easy"   data-diff="Easy">Easy</button>
    <button class="pill medium" data-diff="Medium">Medium</button>
    <button class="pill hard"   data-diff="Hard">Hard</button>
  </div>
</div>
<div class="count-info" id="countInfo"></div>

<div class="grid" id="grid">
  <div class="state-box"><div class="spinner"></div>Loading from GitHub…</div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-top">
      <div>
        <div class="modal-id" id="mId"></div>
        <div class="modal-title" id="mTitle"></div>
      </div>
      <div class="modal-actions">
        <a class="lc-link" id="mLink" href="#" target="_blank">LeetCode ↗</a>
        <span class="badge" id="mBadge"></span>
        <button class="modal-close" id="mClose">✕</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="q">📄 Question</button>
      <button class="tab" data-tab="s">💻 Solution</button>
    </div>
    <div class="tab-pane active" id="pane-q">
      <div class="q-body" id="qBody"></div>
    </div>
    <div class="tab-pane" id="pane-s">
      <div class="sol-pane">
        <div class="lang-row" id="langRow"></div>
        <div class="code-wrap">
          <div class="code-header">
            <span id="codeLang">solution</span>
            <button class="copy-btn" id="copyBtn">Copy</button>
          </div>
          <pre class="code-pre" id="codeBlock"></pre>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const USER   = 'rbhomale17';
const REPO   = 'leetcode-solutions';
const BRANCH = 'main';
const RAW    = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}`;
const API    = `https://api.github.com/repos/${USER}/${REPO}`;

let problems = [], activeFilter = 'all', searchVal = '', currentP = null;

// ── LOAD ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch(`${API}/git/trees/${BRANCH}?recursive=1`);
    const data = await res.json();
    if (!data.tree) throw new Error(data.message || 'Repo not found');

    const folders = {};
    for (const item of data.tree) {
      const parts = item.path.split('/');
      if (parts.length === 2 && item.type === 'blob') {
        if (!folders[parts[0]]) folders[parts[0]] = [];
        folders[parts[0]].push(parts[1]);
      }
    }

    problems = Object.entries(folders)
      .filter(([f]) => /^\d+-.+/.test(f))
      .map(([folder, files]) => {
        const m     = folder.match(/^(\d+)-(.+)$/);
        const num   = parseInt(m[1]);
        const title = m[2].split('-').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
        const langs = files.filter(f => f !== 'README.md').map(f => f.split('.').pop());
        const slug  = m[2];
        return { num, folder, title, slug, langs, difficulty: null, readme: null, solutions: {} };
      })
      .sort((a, b) => a.num - b.num);

    await loadReadmes(problems.slice(0, 60));
    renderAll();
    if (problems.length > 60) loadReadmes(problems.slice(60)).then(renderAll);
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="state-box">⚠️ ${e.message}</div>`;
  }
}

async function loadReadmes(list) {
  await Promise.all(list.map(async p => {
    try {
      const r = await fetch(`${RAW}/${p.folder}/README.md`);
      const text = await r.text();
      p.readme = text;
      const m = text.match(/\b(Easy|Medium|Hard)\b/);
      p.difficulty = m ? m[1] : '';
    } catch { p.difficulty = ''; }
  }));
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll() {
  const easy   = problems.filter(p => p.difficulty === 'Easy').length;
  const medium = problems.filter(p => p.difficulty === 'Medium').length;
  const hard   = problems.filter(p => p.difficulty === 'Hard').length;
  const total  = problems.length;

  document.getElementById('sTotal').textContent = total;
  document.getElementById('sEasy').textContent  = easy;
  document.getElementById('sMed').textContent   = medium;
  document.getElementById('sHard').textContent  = hard;
  document.getElementById('bTotal').style.width = '100%';
  document.getElementById('bEasy').style.width  = total ? (easy/total*100)+'%' : '0';
  document.getElementById('bMed').style.width   = total ? (medium/total*100)+'%' : '0';
  document.getElementById('bHard').style.width  = total ? (hard/total*100)+'%' : '0';

  const filtered = problems.filter(p => {
    const okD = activeFilter === 'all' || p.difficulty === activeFilter;
    const okS = !searchVal ||
      p.title.toLowerCase().includes(searchVal.toLowerCase()) ||
      String(p.num).includes(searchVal);
    return okD && okS;
  });

  document.getElementById('countInfo').textContent =
    `Showing ${filtered.length} of ${total} problems`;

  if (!filtered.length) {
    document.getElementById('grid').innerHTML = `<div class="state-box">No problems match.</div>`;
    return;
  }

  document.getElementById('grid').innerHTML = filtered.map(p => `
    <div class="card ${p.difficulty||''}" onclick="openCard('${p.folder}')">
      <div class="card-head">
        <div>
          <div class="card-id">#${String(p.num).padStart(4,'0')}</div>
          <div class="card-title" title="${p.title}">${p.title}</div>
        </div>
        ${p.difficulty ? `<span class="badge ${p.difficulty}">${p.difficulty}</span>` : ''}
      </div>
      <div class="card-langs">
        ${p.langs.map(l => `<span class="lang-chip">.${l}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// ── README → clean HTML ───────────────────────────────────────────────────
function readmeToHtml(md) {
  if (!md) return '<p>No description available.</p>';

  // If it looks like it already contains HTML tags (LeetHub AI format)
  if (/<h[1-6]|<p |<ul|<pre|<code/.test(md)) {
    // It's HTML — sanitize and render directly
    // Remove <a> tags wrapping headings (LeetHub adds them)
    return md
      .replace(/<a\s[^>]*>(.*?)<\/a>/gs, '$1') // strip anchor wrappers
      .replace(/href="[^"]*"/g, '')             // strip any leftover hrefs
      ;
  }

  // Plain markdown fallback
  return md
    .replace(/^#{3}\s(.+)/gm, '<h3>$1</h3>')
    .replace(/^#{2}\s(.+)/gm, '<h2>$1</h2>')
    .replace(/^#{1}\s(.+)/gm, '<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^```[\w]*\n([\s\S]*?)```/gm, '<pre><code>$1</code></pre>')
    .replace(/^\- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^(?!<[hup]|<\/[hup])(.+)/gm, '$1')
    .replace(/^/g, '<p>') + '</p>';
}

// ── MODAL ─────────────────────────────────────────────────────────────────
async function openCard(folder) {
  const p = problems.find(x => x.folder === folder);
  if (!p) return;
  currentP = p;

  document.getElementById('mId').textContent    = `Problem #${String(p.num).padStart(4,'0')}`;
  document.getElementById('mTitle').textContent = p.title;
  const b = document.getElementById('mBadge');
  b.textContent = p.difficulty || ''; b.className = `badge ${p.difficulty||''}`;
  document.getElementById('mLink').href =
    `https://leetcode.com/problems/${p.slug}/description/`;

  document.getElementById('qBody').innerHTML = readmeToHtml(p.readme);
  switchTab('q');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (!Object.keys(p.solutions).length) {
    await Promise.all(p.langs.map(async lang => {
      try {
        const r = await fetch(`${RAW}/${p.folder}/${p.folder}.${lang}`);
        p.solutions[lang] = await r.text();
      } catch { p.solutions[lang] = '// Could not load'; }
    }));
  }

  const row = document.getElementById('langRow');
  row.innerHTML = p.langs.map((l,i) =>
    `<button class="lang-btn ${i===0?'active':''}" onclick="pickLang(this,'${l}')">.${l}</button>`
  ).join('');
  if (p.langs[0]) showCode(p.langs[0]);
}

function pickLang(btn, lang) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showCode(lang);
}
function showCode(lang) {
  document.getElementById('codeBlock').textContent = currentP?.solutions[lang] || '';
  document.getElementById('codeLang').textContent  = lang;
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `pane-${tab}`));
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('mClose').onclick = closeModal;
document.getElementById('overlay').onclick = e => { if(e.target===e.currentTarget) closeModal(); };
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.querySelectorAll('.tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));
document.querySelectorAll('.pill').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.diff;
    renderAll();
  };
});
document.getElementById('search').oninput = e => { searchVal = e.target.value.trim(); renderAll(); };
document.getElementById('copyBtn').onclick = () => {
  navigator.clipboard.writeText(document.getElementById('codeBlock').textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
};

init();
</script>
